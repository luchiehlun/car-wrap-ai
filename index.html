<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI車體改色模擬器</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:#1e1e1e;
padding:30px;
border-radius:12px;
}

h1{
margin-bottom:20px;
}

select,input{
padding:10px;
margin-top:10px;
}

button{
padding:12px 20px;
background:#00c3ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:20px;
font-size:16px;
}

canvas{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI車體改色模擬器</h1>

<input type="file" id="upload">

<br><br>

<select id="color">

<option value="#222222">消光黑</option>
<option value="#777777">水泥灰</option>
<option value="#d40000">桃紅</option>
<option value="#ff6b00">橘色</option>
<option value="#0047ff">寶藍</option>
<option value="#2ecc71">綠色</option>

</select>

<br>

<button onclick="wrapColor()">生成模擬</button>

<br>

<canvas id="canvas"></canvas>

</div>

<script>

let img = new Image();
let carMask = null;

/* 上傳圖片 */

document.getElementById("upload").addEventListener("change",function(e){

let reader = new FileReader();

reader.onload=function(event){

img.src = event.target.result;

};

reader.readAsDataURL(e.target.files[0]);

});


/* AI改色 */

async function wrapColor(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let color=document.getElementById("color").value;

let imgData=ctx.getImageData(0,0,canvas.width,canvas.height);

let pixels=imgData.data;

/* 車身遮罩演算法 */

for(let i=0;i<pixels.length;i+=4){

let r=pixels[i];
let g=pixels[i+1];
let b=pixels[i+2];

let brightness=(r+g+b)/3;

/* 排除天空和亮區 */

if(brightness<200){

let rgb=hexToRgb(color);

/* 改色 */

pixels[i]=r*0.4 + rgb.r*0.6;
pixels[i+1]=g*0.4 + rgb.g*0.6;
pixels[i+2]=b*0.4 + rgb.b*0.6;

}

}

ctx.putImageData(imgData,0,0);

}


/* HEX轉RGB */

function hexToRgb(hex){

let r=parseInt(hex.substring(1,3),16);
let g=parseInt(hex.substring(3,5),16);
let b=parseInt(hex.substring(5,7),16);

return {r,g,b};

}

</script>

</body>
</html>
