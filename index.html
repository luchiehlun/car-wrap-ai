<script>

let img = new Image();

document.getElementById("upload").addEventListener("change",function(e){

let reader = new FileReader();

reader.onload=function(event){

img.src = event.target.result;

};

reader.readAsDataURL(e.target.files[0]);

});

async function wrapColor(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let color=document.getElementById("color").value;

const reader=new FileReader();

reader.onload=async function(){

let base64=reader.result;

let response=await fetch("/api/segment",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
image:base64
})

});

let data=await response.json();

console.log("AI mask:",data);

/* 取得像素 */

let imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
let pixels=imgData.data;

/* 模擬車身mask */

for(let i=0;i<pixels.length;i+=4){

let brightness=(pixels[i]+pixels[i+1]+pixels[i+2])/3;

if(brightness<200){

pixels[i]=pixels[i]*0.5 + hexToRgb(color).r*0.5;
pixels[i+1]=pixels[i+1]*0.5 + hexToRgb(color).g*0.5;
pixels[i+2]=pixels[i+2]*0.5 + hexToRgb(color).b*0.5;

}

}

ctx.putImageData(imgData,0,0);

};

reader.readAsDataURL(document.getElementById("upload").files[0]);

}

function hexToRgb(hex){

let r=parseInt(hex.substring(1,3),16);
let g=parseInt(hex.substring(3,5),16);
let b=parseInt(hex.substring(5,7),16);

return {r,g,b};

}

</script>
