<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI改色模擬器</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
}

h1{
margin-bottom:30px;
}

select,input{
padding:10px;
margin:10px;
width:220px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#00c3ff;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.preview{
display:flex;
gap:20px;
margin-top:30px;
justify-content:center;
}

.preview img{
max-width:350px;
border-radius:10px;
}

.line{
background:#06c755;
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI改色模擬器</h1>

<p>上傳你的車照片</p>

<input type="file" id="carImage">

<br>

<h3>選擇膜料品牌</h3>

<select id="brand">
<option>3M</option>
<option>AX</option>
<option>LNPPF</option>
<option>SYTK</option>
</select>

<h3>選擇顏色</h3>

<select id="color">
<option>Nardo Grey</option>
<option>Satin Black</option>
<option>Frozen Blue</option>
<option>Sakura Pink</option>
<option>Cement Grey</option>
<option>British Racing Green</option>
<option>Midnight Purple</option>
</select>

<br>

<button onclick="generate()">生成模擬</button>

<div class="preview" id="preview"></div>

<button class="line" onclick="window.location.href='https://line.me'">
LINE預約施工
</button>

</div>

<script>

async function generate(){

let file = document.getElementById("carImage").files[0];

if(!file){
alert("請先上傳照片");
return;
}

let color = document.getElementById("color").value;

let imgURL = URL.createObjectURL(file);

document.getElementById("preview").innerHTML =
"<div><h3>原車</h3><img src='"+imgURL+"'></div>"+
"<div><h3>AI生成中...請等待</h3></div>";

const reader = new FileReader();

reader.onload = async function(){

let base64 = reader.result;

let response = await fetch("/api/generate", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
image:base64,
prompt:"change the car body color to "+color+" vinyl wrap"
})

});

let data = await response.json();

console.log(data);

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
