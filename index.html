<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI車體改色模擬器</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:#1e1e1e;
padding:30px;
border-radius:12px;
}

button{
padding:12px 20px;
background:#00c3ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

canvas{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

select{
padding:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>AI車體改色模擬器</h1>

<input type="file" id="upload">

<br><br>

<select id="color">

<option value="#222222">消光黑</option>
<option value="#777777">水泥灰</option>
<option value="#d40000">桃紅</option>
<option value="#ff6b00">橘色</option>
<option value="#0047ff">寶藍</option>
<option value="#2ecc71">綠色</option>

</select>

<br>

<button onclick="wrapColor()">生成模擬</button>

<br>

<canvas id="canvas"></canvas>

</div>

<script>

let img = new Image()

document.getElementById("upload").addEventListener("change",function(e){

let reader = new FileReader()

reader.onload=function(event){

img.src = event.target.result

}

reader.readAsDataURL(e.target.files[0])

})


async function wrapColor(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

let color=document.getElementById("color").value

/* 壓縮圖片 */

let resizeCanvas=document.createElement("canvas")
let rctx=resizeCanvas.getContext("2d")

let maxSize=1024

let ratio=Math.min(maxSize/img.width , maxSize/img.height)

resizeCanvas.width=img.width*ratio
resizeCanvas.height=img.height*ratio

rctx.drawImage(img,0,0,resizeCanvas.width,resizeCanvas.height)

let compressed=resizeCanvas.toDataURL("image/jpeg",0.8)


/* 呼叫 AI segmentation */

let response=await fetch("/api/segment",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
image:compressed
})

})

let result=await response.json()

console.log("AI segmentation:",result)


/* 取得原圖像素 */

let imgData=ctx.getImageData(0,0,canvas.width,canvas.height)

let pixels=imgData.data

let rgb=hexToRgb(color)


/* 模擬 mask 區域改色 */

for(let i=0;i<pixels.length;i+=4){

let r=pixels[i]
let g=pixels[i+1]
let b=pixels[i+2]

let brightness=(r+g+b)/3

/* 只改中間亮度（車身最常出現） */

if(brightness>80 && brightness<200){

pixels[i]=r*0.3 + rgb.r*0.7
pixels[i+1]=g*0.3 + rgb.g*0.7
pixels[i+2]=b*0.3 + rgb.b*0.7

}

}

ctx.putImageData(imgData,0,0)

}


function hexToRgb(hex){

let r=parseInt(hex.substring(1,3),16)
let g=parseInt(hex.substring(3,5),16)
let b=parseInt(hex.substring(5,7),16)

return {r,g,b}

}

</script>

</body>
</html>
